services:
  nginx:
    image: nginx:latest
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=<midominio.com>
      - LETSENCRYPT_HOST=<midominio.com>
      - LETSENCRYPT_EMAIL=<tu-email@ejemplo.com>
    volumes:
      - ./web:/usr/share/nginx/html:ro
    # Descomenta solo si usas React Router:
      # - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy
    restart: unless-stopped
networks:
  proxy:
    name: nginx-proxy
    external: true